name: Refresh market data (US10Y/TH10Y/BDI/PMI)

# Relays TradingEconomics scrapes into usd/market-data.json (same-origin) so
# the dashboard can auto-fill these fields without hitting TE's CORS block.
on:
  schedule:
    - cron: "20 * * * *"   # hourly, offset to avoid top-of-hour load spikes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4

      - run: python scripts/fetch_market_data.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- usd/market-data.json; then
            echo "market-data.json unchanged, skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add usd/market-data.json
          git commit -m "Refresh market data [skip ci]"
          git push

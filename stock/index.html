<style>
  :root{

    --border:rgba(11,11,11,0.10); --cat-1:#2a78d6;

  @media (prefers-color-scheme: dark){

  .list li{

  }
  .list a{color:var(--cat-1);text-decoration:none;font-weight:600;font-size:15px;}
  .list a:hover{text-decoration:underline;}
  .list .date{color:var(--text-muted);font-size:12px;margin-top:4px;}
  .empty{color:var(--text-muted);font-size:14px;}
